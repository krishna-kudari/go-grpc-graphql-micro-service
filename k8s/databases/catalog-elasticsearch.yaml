apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-db
  template:
    metadata:
      labels:
        app: catalog-db
    spec:
      containers:
      - name: catalog-db
        image: docker.elastic.co/elasticsearch/elasticsearch:8.19.3
        env:
          - name: discovery.type
            value:  single-node
          - name: xpack.security.enabled
            value: "false"
          - name: xpack.security.enrollment.enabled
            value: "false"
          - name: ES_JAVA_OPTS
            value: "-Xms256m -Xmx256m"
        ports:
        - containerPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db
spec:
  selector:
    app: catalog-db
  ports:
  - port: 9200
