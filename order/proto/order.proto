syntax="proto3";
package order;

option go_package = "github.com/krishna-kudari/go-grpc-graphql-micro-service/order/pb;pb";
import "google/protobuf/timestamp.proto";

 message OrderedProduct {
    string id = 1;
    string order_id = 2;
    string product_id = 3;
    uint32 quantity = 4;
 }

 message Order {
    string id = 1;
    string account_id = 2;
    double total_price = 3;
    repeated OrderedProduct products = 4;
    google.protobuf.Timestamp created_at = 5;
 }

message PostOrderRequest {
    string account_id = 1;
    repeated OrderedProduct products = 2;
}

message PostOrderResponse {
    Order order = 1;
}

message GetOrdersForAccountRequest {
    string account_id = 1;
}

message GetOrdersForAccountResponse {
    repeated Order orders = 1;
}

service OrderService {
    rpc PostOrder (PostOrderRequest) returns (PostOrderResponse);
    rpc GetOrdersForAccount (GetOrdersForAccountRequest) returns (GetOrdersForAccountResponse);
}
